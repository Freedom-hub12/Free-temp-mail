<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TempMail Pro - Free Temporary Email</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-green-400 min-h-screen font-sans">

<!-- TOP AD -->
<div class="w-full bg-gray-900 text-center py-6 border-b border-green-700 text-green-500 font-semibold">
    Large Top Ad Placeholder (728x90 / 970x250)
</div>

<!-- HEADER -->
<header class="text-center py-8">
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-wide text-green-400">
        TempMail<span class="text-white">Pro</span>
    </h1>
    <p class="mt-3 text-green-600 text-lg">
        Free Disposable Temporary Email Address
    </p>
</header>

<div class="max-w-6xl mx-auto px-4 pb-12 flex flex-col lg:flex-row gap-6">

    <!-- MAIN -->
    <div class="flex-1 bg-gray-950 border border-green-700 rounded-2xl shadow-2xl p-6">

        <!-- Email Box -->
        <div class="mb-6">
            <label class="block mb-2 text-green-500 font-semibold">Your Temporary Email</label>
            <div class="flex flex-col md:flex-row gap-3">
                <input id="emailDisplay" type="text" readonly
                    class="flex-1 bg-black border border-green-600 rounded-lg p-4 text-green-400 text-lg" />
                <button id="copyBtn"
                    class="bg-green-600 hover:bg-green-500 text-black font-bold px-6 py-3 rounded-lg transition">
                    Copy
                </button>
                <button id="newEmailBtn"
                    class="bg-white hover:bg-gray-200 text-black font-bold px-6 py-3 rounded-lg transition">
                    New Email
                </button>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex gap-3 mb-6">
            <button id="refreshBtn"
                class="bg-green-700 hover:bg-green-600 text-black font-semibold px-5 py-2 rounded-lg transition">
                Refresh Inbox
            </button>
        </div>

        <!-- Inbox -->
        <div>
            <h2 class="text-xl font-bold mb-4 text-green-400 border-b border-green-700 pb-2">
                Inbox
            </h2>
            <div id="inboxList" class="space-y-3"></div>
        </div>

    </div>

    <!-- SIDEBAR -->
    <aside class="w-full lg:w-72 bg-gray-950 border border-green-700 rounded-2xl p-6 text-center">
        <div class="bg-black border border-green-600 h-64 flex items-center justify-center text-green-600 font-semibold">
            Sidebar Ad Placeholder (300x250)
        </div>
    </aside>

</div>

<!-- MODAL -->
<div id="emailModal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center p-4">
    <div class="bg-gray-950 border border-green-700 w-full max-w-2xl rounded-xl p-6 relative">
        <button id="closeModal" class="absolute top-4 right-4 text-green-500 hover:text-white text-xl">✕</button>
        <h3 id="modalSubject" class="text-2xl font-bold mb-2"></h3>
        <p id="modalFrom" class="text-green-600 mb-4"></p>
        <div id="modalContent" class="text-green-300 whitespace-pre-wrap break-words"></div>
    </div>
</div>

<script>
const API = "https://api.mail.tm";
let token = "";
let currentEmail = "";
let currentPassword = "";

// Random string generator
function randomString(length) {
    const chars = "abcdefghijklmnopqrstuvwxyz1234567890";
    let result = "";
    for (let i = 0; i < length; i++) {
        result += chars[Math.floor(Math.random() * chars.length)];
    }
    return result;
}

// Create new email account
async function createNewEmail() {
    try {
        document.getElementById("inboxList").innerHTML = "Generating...";

        const domainRes = await fetch(API + "/domains");
        const domainData = await domainRes.json();
        const domain = domainData["hydra:member"][0].domain;

        currentEmail = randomString(10) + "@" + domain;
        currentPassword = randomString(12);

        await fetch(API + "/accounts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                address: currentEmail,
                password: currentPassword
            })
        });

        const loginRes = await fetch(API + "/token", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                address: currentEmail,
                password: currentPassword
            })
        });

        const loginData = await loginRes.json();
        token = loginData.token;

        document.getElementById("emailDisplay").value = currentEmail;
        loadInbox();

    } catch (err) {
        alert("Error creating email");
        console.error(err);
    }
}

// Load inbox
async function loadInbox() {
    const inboxList = document.getElementById("inboxList");
    inboxList.innerHTML = "Loading...";

    const res = await fetch(API + "/messages", {
        headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    const messages = data["hydra:member"];

    inboxList.innerHTML = "";

    if (!messages || messages.length === 0) {
        inboxList.innerHTML = "<p class='text-green-600'>No messages yet.</p>";
        return;
    }

    messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = "border border-green-700 p-4 rounded-lg hover:bg-black cursor-pointer transition";
        div.innerHTML = `
            <p class="font-bold">${msg.subject || "(No Subject)"}</p>
            <p class="text-sm text-green-600">${msg.from.address}</p>
        `;
        div.onclick = () => openMessage(msg.id);
        inboxList.appendChild(div);
    });
}

// Open message
async function openMessage(id) {
    const res = await fetch(API + "/messages/" + id, {
        headers: { Authorization: "Bearer " + token }
    });

    const msg = await res.json();

    document.getElementById("modalSubject").innerText = msg.subject || "(No Subject)";
    document.getElementById("modalFrom").innerText = "From: " + msg.from.address;
    document.getElementById("modalContent").innerText = msg.text || msg.html || "";

    document.getElementById("emailModal").classList.remove("hidden");
    document.getElementById("emailModal").classList.add("flex");
}

// Close modal
document.getElementById("closeModal").onclick = () => {
    document.getElementById("emailModal").classList.add("hidden");
};

// Copy email
document.getElementById("copyBtn").onclick = () => {
    navigator.clipboard.writeText(currentEmail);
};

// Buttons
document.getElementById("refreshBtn").onclick = loadInbox;
document.getElementById("newEmailBtn").onclick = createNewEmail;

// Init
createNewEmail();
</script>

</body>
</html>
