<!DOCTYPE html>
<html lang="en" class="zoom-out">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TempMail Pro - Futuristic Temporary Email</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html.zoom-out { zoom: 0.9; }
@media (max-width:768px){ html.zoom-out{ zoom:1; } }

body{
    background: radial-gradient(circle at 20% 20%, #0f172a 0%, #020617 60%, #000 100%);
    text-align:center;
}

/* Glass */
.glass-3d{
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(25px);
    border:1px solid rgba(34,197,94,0.3);
    box-shadow:0 0 20px rgba(34,197,94,0.15),
               0 15px 40px rgba(0,0,0,0.7);
}

/* Buttons */
.btn-futuristic{
    background: linear-gradient(145deg, rgba(34,197,94,0.25), rgba(34,197,94,0.05));
    border:1px solid rgba(34,197,94,0.4);
    backdrop-filter: blur(10px);
    transition:all .15s ease;
    box-shadow:0 0 10px rgba(34,197,94,0.2);
}
.btn-futuristic:hover{ box-shadow:0 0 20px rgba(34,197,94,0.5); }
.btn-futuristic:active{ transform:scale(.95); }

.input-futuristic{
    background:rgba(0,0,0,.4);
    border:1px solid rgba(34,197,94,.5);
    backdrop-filter:blur(15px);
    box-shadow: inset 0 0 15px rgba(34,197,94,.1);
    text-align:center;
}

.footer-link{ color:#22c55e; transition:.3s; }
.footer-link:hover{ color:white; text-shadow:0 0 10px #22c55e; }

.fade-swap{ transition:opacity .25s ease, transform .25s ease; }
.hidden-icon{ opacity:0; transform:scale(.5); position:absolute; }
.visible-icon{ opacity:1; transform:scale(1); position:relative; }
.icon-animate{ animation:bounce .25s ease; }
@keyframes bounce{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}
</style>
</head>

<body class="text-green-400 min-h-screen font-sans flex flex-col items-center">

<header class="py-10 w-full">
<h1 class="text-4xl font-extrabold tracking-widest text-green-400">
TempMail<span class="text-white">Pro</span>
</h1>
<p class="mt-3 text-green-500 text-base">
Futuristic • Anonymous • Disposable Email
</p>
</header>

<div class="max-w-5xl w-full px-4 pb-12 flex flex-col lg:flex-row gap-8 items-center">

<div class="flex-1 glass-3d rounded-3xl p-8 flex flex-col items-center w-full">

<label class="mb-3 text-lg font-semibold">
Your Temporary Email
</label>

<div class="flex flex-col md:flex-row gap-3 mb-6 items-center w-full">

<div class="flex flex-1 relative w-full">
<input id="emailDisplay" type="text" readonly
class="flex-1 input-futuristic rounded-l-xl p-3 text-green-300 text-base w-full"/>

<button id="copyIconBtn"
class="px-4 rounded-r-xl flex items-center justify-center bg-green-900/40 border-l border-green-500 relative">

<svg id="copyIcon" xmlns="http://www.w3.org/2000/svg"
class="w-5 h-5 text-green-400 fade-swap visible-icon"
fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M8 16h8M8 12h8m-6 8h6a2 2 0 002-2V6a2 2 0 00-2-2h-6l-4 4v10a2 2 0 002 2z"/>
</svg>

<svg id="doneIcon" xmlns="http://www.w3.org/2000/svg"
class="w-5 h-5 text-green-400 fade-swap hidden-icon"
fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M5 13l4 4L19 7"/>
</svg>

</button>
</div>

<button id="copyBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm relative overflow-hidden">
<span id="copyText">Copy</span>
<span id="copyCheck" class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-300">
✓ Copied
</span>
</button>

<button id="newEmailBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm">
New Email
</button>

</div>

<div class="btn-futuristic rounded-2xl p-5 text-green-500 font-semibold mb-6 w-full text-sm">
Mid Content Ad Placeholder
</div>

<button id="refreshBtn" class="btn-futuristic px-4 py-2 rounded-xl font-semibold mb-5 text-sm">
Refresh Inbox
</button>

<h2 class="text-xl font-bold mb-3 border-b border-green-700 pb-2 w-full">
Inbox
</h2>

<div id="inboxList" class="space-y-3 w-full text-sm"></div>

<div class="btn-futuristic rounded-2xl p-5 text-green-500 font-semibold mt-8 w-full text-sm">
Bottom Content Ad Placeholder
</div>

</div>

<aside class="w-full lg:w-72 glass-3d rounded-3xl p-6 flex items-center justify-center text-green-500 font-semibold text-sm">
Sidebar Ad Placeholder (300x250)
</aside>

</div>

<!-- ✅ FULL WIDTH CENTERED FOOTER -->
<footer class="w-full mt-10">
<div class="glass-3d w-full py-8 px-4 flex flex-col items-center justify-center text-sm text-green-500">

<div class="flex flex-wrap justify-center items-center gap-6 mb-4 w-full">
<a href="#" class="footer-link">Terms of Service</a>
<a href="#" class="footer-link">Privacy Policy</a>
<a href="#" class="footer-link">DMCA</a>
<a href="#" class="footer-link">Contact</a>
</div>

<p class="text-green-700 text-xs text-center w-full">
© 2026 TempMailPro. All rights reserved.
</p>

</div>
</footer>

<script>
const API="https://api.mail.tm";
let token="",currentEmail="",currentPassword="";

function randomString(length){
const chars="abcdefghijklmnopqrstuvwxyz1234567890";
return Array.from({length},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
}

async function createNewEmail(){
document.getElementById("inboxList").innerHTML="Generating...";
const domainRes=await fetch(API+"/domains");
const domainData=await domainRes.json();
const domain=domainData["hydra:member"][0].domain;
currentEmail=randomString(10)+"@"+domain;
currentPassword=randomString(12);
await fetch(API+"/accounts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({address:currentEmail,password:currentPassword})});
const loginRes=await fetch(API+"/token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({address:currentEmail,password:currentPassword})});
const loginData=await loginRes.json();
token=loginData.token;
document.getElementById("emailDisplay").value=currentEmail;
loadInbox();
}

async function loadInbox(){
const inboxList=document.getElementById("inboxList");
inboxList.innerHTML="Loading...";
const res=await fetch(API+"/messages",{headers:{Authorization:"Bearer "+token}});
const data=await res.json();
const messages=data["hydra:member"];
inboxList.innerHTML="";
if(!messages||messages.length===0){
inboxList.innerHTML="<p class='text-green-500'>No messages yet.</p>";
return;
}
messages.forEach(msg=>{
const div=document.createElement("div");
div.className="p-3 rounded-xl bg-green-900/20 border border-green-500/30";
div.innerHTML=`<p class="font-bold">${msg.subject||"(No Subject)"}</p>
<p class="text-green-500">${msg.from.address}</p>`;
inboxList.appendChild(div);
});
}

async function copyEmail(){
if(!currentEmail)return;
await navigator.clipboard.writeText(currentEmail);
}

document.getElementById("copyBtn").onclick=async function(){
await copyEmail();
const copyText=document.getElementById("copyText");
const copyCheck=document.getElementById("copyCheck");
copyText.classList.add("opacity-0");
copyCheck.classList.remove("opacity-0");
setTimeout(()=>{ copyCheck.classList.add("opacity-0"); copyText.classList.remove("opacity-0"); },1200);
};

document.getElementById("copyIconBtn").onclick=async function(){
const copyIcon=document.getElementById("copyIcon");
const doneIcon=document.getElementById("doneIcon");
await copyEmail();
copyIcon.classList.replace("visible-icon","hidden-icon");
doneIcon.classList.replace("hidden-icon","visible-icon");
doneIcon.classList.add("icon-animate");
setTimeout(()=>{
doneIcon.classList.replace("visible-icon","hidden-icon");
copyIcon.classList.replace("hidden-icon","visible-icon");
},1200);
};

document.getElementById("refreshBtn").onclick=function(){ loadInbox(); };
document.getElementById("newEmailBtn").onclick=function(){ createNewEmail(); };

createNewEmail();
</script>

</body>
</html>
