<!DOCTYPE html>
<html lang="en" class="zoom-out">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TempMail Pro - Futuristic Temporary Email</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html.zoom-out { zoom: 0.9; }
@media (max-width:768px){ html.zoom-out{ zoom:1; } }

body{
    background: radial-gradient(circle at 20% 20%, #0f172a 0%, #020617 60%, #000 100%);
    text-align:center;
}

.glass-3d{
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(25px);
    border:1px solid rgba(34,197,94,0.3);
    box-shadow:0 0 20px rgba(34,197,94,0.15),
               0 15px 40px rgba(0,0,0,0.7);
}

.btn-futuristic{
    background: linear-gradient(145deg, rgba(34,197,94,0.25), rgba(34,197,94,0.05));
    border:1px solid rgba(34,197,94,0.4);
    backdrop-filter: blur(10px);
    transition:all .15s ease;
    box-shadow:0 0 10px rgba(34,197,94,0.2);
}
.btn-futuristic:hover{ box-shadow:0 0 20px rgba(34,197,94,0.5); }
.btn-futuristic:active{ transform:scale(.95); }

.input-futuristic{
    background:rgba(0,0,0,.4);
    border:1px solid rgba(34,197,94,.5);
    backdrop-filter:blur(15px);
    box-shadow: inset 0 0 15px rgba(34,197,94,.1);
    text-align:center;
}

.footer-link{ color:#22c55e; transition:.3s; }
.footer-link:hover{ color:white; text-shadow:0 0 10px #22c55e; }

/* FIXED DROPDOWN */
.lang-menu{
    position:absolute;
    right:0;
    top:60px;
    min-width:140px;
    display:none;
    z-index:9999; /* ensures it appears above everything */
}
.lang-menu button{
    width:100%;
    padding:8px;
    text-align:center;
}
.lang-menu.show{ display:block; }

/* Ad placeholders */
.ad-placeholder{
    margin:25px 0;
    padding:25px;
    border-radius:20px;
    font-size:14px;
    letter-spacing:1px;
    color:#22c55e;
    background: rgba(0,0,0,0.35);
    border:1px dashed rgba(34,197,94,0.4);
    backdrop-filter: blur(20px);
    box-shadow:0 0 20px rgba(34,197,94,0.15);
}
</style>
</head>

<body class="text-green-400 min-h-screen font-sans flex flex-col items-center">

<!-- TOP BAR -->
<div class="w-full flex justify-between items-center px-6 py-4">
<h1 class="text-2xl font-extrabold tracking-widest text-green-400">
TempMail<span class="text-white">Pro</span>
</h1>

<div class="relative z-50"><!-- z-50 added -->
<button id="langBtn" class="btn-futuristic px-4 py-2 rounded-lg text-sm flex items-center gap-2">
<span id="currentLang">EN</span> ▼
</button>

<div id="langMenu" class="lang-menu glass-3d rounded-xl overflow-hidden">
<button onclick="setLanguage('en')" class="btn-futuristic">English</button>
<button onclick="setLanguage('fr')" class="btn-futuristic">Français</button>
<button onclick="setLanguage('es')" class="btn-futuristic">Español</button>
<button onclick="setLanguage('ar')" class="btn-futuristic">العربية</button>
</div>
</div>
</div>

<div class="max-w-5xl w-full px-4 pb-12 flex flex-col lg:flex-row gap-8 items-center">
<div class="flex-1 glass-3d rounded-3xl p-8 flex flex-col items-center w-full">

<label id="labelEmail" class="mb-3 text-lg font-semibold">
Your Temporary Email
</label>

<div class="flex flex-col md:flex-row gap-3 mb-6 items-center w-full">
<div class="flex flex-1 relative w-full">
<input id="emailDisplay" type="text" readonly
class="flex-1 input-futuristic rounded-xl p-3 text-green-300 text-base w-full"/>
</div>

<button id="copyBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm">
<span id="copyText">Copy</span>
</button>

<button id="newEmailBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm">
New Email
</button>
</div>

<button id="refreshBtn" class="btn-futuristic px-4 py-2 rounded-xl font-semibold mb-5 text-sm">
Refresh Inbox
</button>

<!-- AD PLACEHOLDER 1 -->
<div class="ad-placeholder w-full">
Ad Space (728x90 or Responsive Banner)
</div>

<h2 id="inboxTitle" class="text-xl font-bold mb-3 border-b border-green-700 pb-2 w-full">
Inbox
</h2>

<div id="inboxList" class="space-y-3 w-full text-sm">
<p>No messages yet.</p>
</div>

<!-- AD PLACEHOLDER 2 -->
<div class="ad-placeholder w-full">
Ad Space (300x250 or Native Ad)
</div>

</div>
</div>

<footer class="w-full mt-10">
<div class="glass-3d w-full py-8 px-4 flex flex-col items-center justify-center text-sm text-green-500">
<div class="flex flex-wrap justify-center items-center gap-6 mb-4 w-full">
<a id="terms" href="#" class="footer-link">Terms of Service</a>
<a id="privacy" href="#" class="footer-link">Privacy Policy</a>
<a id="contact" href="#" class="footer-link">Contact</a>
</div>
<p class="text-green-700 text-xs text-center w-full">
© 2026 TempMailPro
</p>
</div>
</footer>

<script>
const translations={
en:{labelEmail:"Your Temporary Email",copy:"Copy",newEmail:"New Email",refresh:"Refresh Inbox",inbox:"Inbox"},
fr:{labelEmail:"Votre Email Temporaire",copy:"Copier",newEmail:"Nouvel Email",refresh:"Actualiser la Boîte",inbox:"Boîte de Réception"},
es:{labelEmail:"Tu Correo Temporal",copy:"Copiar",newEmail:"Nuevo Email",refresh:"Actualizar Bandeja",inbox:"Bandeja de Entrada"},
ar:{labelEmail:"بريدك المؤقت",copy:"نسخ",newEmail:"بريد جديد",refresh:"تحديث الوارد",inbox:"الوارد"}
};

function setLanguage(lang){
document.getElementById("labelEmail").innerText=translations[lang].labelEmail;
document.getElementById("copyText").innerText=translations[lang].copy;
document.getElementById("newEmailBtn").innerText=translations[lang].newEmail;
document.getElementById("refreshBtn").innerText=translations[lang].refresh;
document.getElementById("inboxTitle").innerText=translations[lang].inbox;
document.getElementById("currentLang").innerText=lang.toUpperCase();
document.getElementById("langMenu").classList.remove("show");
document.body.dir = (lang==="ar") ? "rtl" : "ltr";
}

document.getElementById("langBtn").onclick=function(){
document.getElementById("langMenu").classList.toggle("show");
};
</script>

</body>
</html>
