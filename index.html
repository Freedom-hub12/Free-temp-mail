<!DOCTYPE html>
<html lang="en" class="zoom-out">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TempMail Pro</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html.zoom-out { zoom: 0.9; }
@media (max-width:768px){ html.zoom-out{ zoom:1; } }

body{
background: radial-gradient(circle at 20% 20%, #0f172a 0%, #020617 60%, #000 100%);
text-align:center;
}

.glass-3d{
background: rgba(15,23,42,0.55);
backdrop-filter: blur(25px);
border:1px solid rgba(34,197,94,0.3);
box-shadow:0 0 20px rgba(34,197,94,0.15),
0 15px 40px rgba(0,0,0,0.7);
}

.btn-futuristic{
background: linear-gradient(145deg, rgba(34,197,94,0.25), rgba(34,197,94,0.05));
border:1px solid rgba(34,197,94,0.4);
backdrop-filter: blur(10px);
transition:.2s;
}
.btn-futuristic:hover{ box-shadow:0 0 20px rgba(34,197,94,0.5); }

.input-futuristic{
background:rgba(0,0,0,.4);
border:1px solid rgba(34,197,94,.5);
backdrop-filter:blur(15px);
text-align:center;
}

.lang-menu{
position:absolute;
right:0;
top:60px;
min-width:140px;
display:none;
z-index:9999;
}
.lang-menu.show{ display:block; }

.ad-placeholder{
margin:25px 0;
padding:25px;
border-radius:20px;
font-size:14px;
color:#22c55e;
background: rgba(0,0,0,0.35);
border:1px dashed rgba(34,197,94,0.4);
backdrop-filter: blur(20px);
}

.footer-link{
color:#22c55e;
transition:.3s;
}
.footer-link:hover{
color:white;
text-shadow:0 0 10px #22c55e;
}
</style>
</head>

<body class="text-green-400 min-h-screen font-sans flex flex-col items-center">

<!-- TOP BAR -->
<div class="w-full flex justify-between items-center px-6 py-4">
<h1 class="text-2xl font-extrabold tracking-widest">
TempMail<span class="text-white">Pro</span>
</h1>

<div class="relative z-50">
<button id="langBtn" class="btn-futuristic px-4 py-2 rounded-lg text-sm">
<span id="currentLang">EN</span> ▼
</button>

<div id="langMenu" class="lang-menu glass-3d rounded-xl overflow-hidden">
<button onclick="setLanguage('en')" class="btn-futuristic w-full p-2">English</button>
<button onclick="setLanguage('fr')" class="btn-futuristic w-full p-2">Français</button>
<button onclick="setLanguage('es')" class="btn-futuristic w-full p-2">Español</button>
<button onclick="setLanguage('ar')" class="btn-futuristic w-full p-2">العربية</button>
</div>
</div>
</div>

<div class="max-w-5xl w-full px-4 pb-12">
<div class="glass-3d rounded-3xl p-8 flex flex-col items-center">

<label id="labelEmail" class="mb-3 text-lg font-semibold">
Your Temporary Email
</label>

<input id="emailDisplay" type="text" readonly
class="input-futuristic rounded-xl p-3 text-green-300 w-full mb-4"/>

<div class="flex gap-3 mb-5 flex-wrap justify-center">
<button id="copyBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm">
Copy
</button>
<button id="newEmailBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm">
New Email
</button>
<button id="refreshBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm">
Refresh Inbox
</button>
</div>

<!-- AD 1 -->
<div class="ad-placeholder w-full">
Ad Space (Banner)
</div>

<h2 id="inboxTitle" class="text-xl font-bold mb-3 border-b border-green-700 pb-2 w-full">
Inbox
</h2>

<div id="inboxList" class="space-y-3 w-full text-sm"></div>

<!-- AD 2 -->
<div class="ad-placeholder w-full">
Ad Space (Native / Rectangle)
</div>

</div>
</div>

<!-- UPDATED FOOTER -->
<footer class="w-full mt-10">
<div class="glass-3d w-full py-8 px-4 flex flex-col items-center text-sm">

<div class="flex flex-wrap justify-center items-center gap-6 mb-4 w-full">
<a href="#" class="footer-link">Terms of Service</a>
<a href="#" class="footer-link">Privacy Policy</a>
<a href="#" class="footer-link">Contact</a>
</div>

<p class="text-green-700 text-xs">
© 2026 TempMailPro. All rights reserved.
</p>

</div>
</footer>

<script>
const API="https://api.mail.tm";
let token="",currentEmail="",currentPassword="";

function randomString(length){
const chars="abcdefghijklmnopqrstuvwxyz1234567890";
return Array.from({length},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
}

async function createNewEmail(){
try{
const domainRes=await fetch(API+"/domains");
const domainData=await domainRes.json();
const domain=domainData["hydra:member"][0].domain;

currentEmail=randomString(10)+"@"+domain;
currentPassword=randomString(12);

await fetch(API+"/accounts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:currentEmail,password:currentPassword})
});

const loginRes=await fetch(API+"/token",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:currentEmail,password:currentPassword})
});
const loginData=await loginRes.json();
token=loginData.token;

document.getElementById("emailDisplay").value=currentEmail;
loadInbox();
}catch(e){
document.getElementById("emailDisplay").value="Error generating email";
}
}

async function loadInbox(){
const inboxList=document.getElementById("inboxList");
inboxList.innerHTML="Loading...";
const res=await fetch(API+"/messages",{headers:{Authorization:"Bearer "+token}});
const data=await res.json();
const messages=data["hydra:member"];
inboxList.innerHTML="";
if(!messages||messages.length===0){
inboxList.innerHTML="<p>No messages yet.</p>";
return;
}
messages.forEach(msg=>{
const div=document.createElement("div");
div.className="p-3 rounded-xl bg-green-900/20 border border-green-500/30";
div.innerHTML=`<p class="font-bold">${msg.subject||"(No Subject)"}</p>
<p class="text-green-500">${msg.from.address}</p>`;
inboxList.appendChild(div);
});
}

document.getElementById("copyBtn").onclick=()=>{
navigator.clipboard.writeText(currentEmail);
};

document.getElementById("newEmailBtn").onclick=createNewEmail;
document.getElementById("refreshBtn").onclick=loadInbox;

document.getElementById("langBtn").onclick=()=>{
document.getElementById("langMenu").classList.toggle("show");
};

createNewEmail();
</script>

</body>
</html>
