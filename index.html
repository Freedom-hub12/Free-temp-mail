<!DOCTYPE html>
<html lang="en" class="zoom-out">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TempMail Pro</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html.zoom-out { zoom: 0.9; }
@media (max-width:768px){ html.zoom-out{ zoom:1; } }

body{
background: radial-gradient(circle at 20% 20%, #0f172a 0%, #020617 60%, #000 100%);
text-align:center;
}

.glass-3d{
background: rgba(15,23,42,0.55);
backdrop-filter: blur(25px);
border:1px solid rgba(34,197,94,0.3);
box-shadow:0 0 20px rgba(34,197,94,0.15),
0 15px 40px rgba(0,0,0,0.7);
}

/* ALL BUTTON CLICK ANIMATION */
.btn-futuristic{
background: linear-gradient(145deg, rgba(34,197,94,0.25), rgba(34,197,94,0.05));
border:1px solid rgba(34,197,94,0.4);
backdrop-filter: blur(10px);
transition:.15s;
}

.btn-futuristic:active{
transform:scale(.94);
}

.btn-clicked{
animation:glowPulse .4s ease;
}

@keyframes glowPulse{
0%{ box-shadow:0 0 0 rgba(34,197,94,0); }
50%{ box-shadow:0 0 25px rgba(34,197,94,.7); }
100%{ box-shadow:0 0 0 rgba(34,197,94,0); }
}

.input-futuristic{
background:rgba(0,0,0,.4);
border:1px solid rgba(34,197,94,.5);
backdrop-filter:blur(15px);
text-align:center;
padding-right:45px;
}

.copy-icon-btn{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
transition:.2s;
}

.copy-icon-btn:active{
transform:translateY(-50%) scale(.85);
}

.icon{
width:20px;
height:20px;
stroke:#22c55e;
transition:.3s;
}

.hidden{ display:none; }

.lang-menu{
position:absolute;
right:0;
top:60px;
min-width:140px;
display:none;
z-index:9999;
}
.lang-menu.show{ display:block; }

.ad-placeholder{
margin:25px 0;
padding:25px;
border-radius:20px;
font-size:14px;
color:#22c55e;
background: rgba(0,0,0,0.35);
border:1px dashed rgba(34,197,94,0.4);
backdrop-filter: blur(20px);
}

.footer-link{
color:#22c55e;
transition:.3s;
}
.footer-link:hover{
color:white;
text-shadow:0 0 10px #22c55e;
}
</style>
</head>

<body class="text-green-400 min-h-screen font-sans flex flex-col items-center">

<div class="w-full flex justify-between items-center px-6 py-4">
<h1 class="text-2xl font-extrabold tracking-widest">
TempMail<span class="text-white">Pro</span>
</h1>

<div class="relative z-50">
<button id="langBtn" class="btn-futuristic px-4 py-2 rounded-lg text-sm">
<span>EN</span> ▼
</button>

<div id="langMenu" class="lang-menu glass-3d rounded-xl overflow-hidden">
<button class="btn-futuristic w-full p-2">English</button>
<button class="btn-futuristic w-full p-2">Français</button>
<button class="btn-futuristic w-full p-2">Español</button>
<button class="btn-futuristic w-full p-2">العربية</button>
</div>
</div>
</div>

<div class="max-w-5xl w-full px-4 pb-12">
<div class="glass-3d rounded-3xl p-8 flex flex-col items-center">

<label class="mb-3 text-lg font-semibold">
Your Temporary Email
</label>

<div class="relative w-full mb-4">
<input id="emailDisplay" type="text" readonly
class="input-futuristic rounded-xl p-3 text-green-300 w-full"/>

<div id="copyIconBtn" class="copy-icon-btn">
<svg id="copyIcon" class="icon" fill="none" viewBox="0 0 24 24" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round"
d="M8 16h8M8 12h8m-6 8h6a2 2 0 002-2V6a2 2 0 00-2-2h-6l-4 4v10a2 2 0 002 2z"/>
</svg>

<svg id="doneIcon" class="icon hidden" fill="none" viewBox="0 0 24 24" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round"
d="M5 13l4 4L19 7"/>
</svg>
</div>
</div>

<div class="flex gap-3 mb-5 flex-wrap justify-center">
<button id="copyBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm flex items-center gap-2">
<span id="copyText">Copy</span>
<span id="copyCheck" class="hidden">✓</span>
</button>

<button id="newEmailBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm">
New Email
</button>

<button id="refreshBtn" class="btn-futuristic px-5 py-2 rounded-xl font-bold text-sm">
Refresh Inbox
</button>
</div>

<div class="ad-placeholder w-full">Ad Space (Banner)</div>

<h2 class="text-xl font-bold mb-3 border-b border-green-700 pb-2 w-full">
Inbox
</h2>

<div id="inboxList" class="space-y-3 w-full text-sm"></div>

<div class="ad-placeholder w-full">Ad Space (Native)</div>

</div>
</div>

<footer class="w-full mt-10">
<div class="glass-3d w-full py-8 px-4 flex flex-col items-center text-sm">
<div class="flex gap-6 mb-4">
<a href="#" class="footer-link">Terms of Service</a>
<a href="#" class="footer-link">Privacy Policy</a>
<a href="#" class="footer-link">Contact</a>
</div>
<p class="text-green-700 text-xs">
© 2026 TempMailPro. All rights reserved.
</p>
</div>
</footer>

<script>
const API="https://api.mail.tm";
let token="",currentEmail="",currentPassword="";

function randomString(length){
const chars="abcdefghijklmnopqrstuvwxyz1234567890";
return Array.from({length},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
}

async function createNewEmail(){
const domainRes=await fetch(API+"/domains");
const domainData=await domainRes.json();
const domain=domainData["hydra:member"][0].domain;

currentEmail=randomString(10)+"@"+domain;
currentPassword=randomString(12);

await fetch(API+"/accounts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({address:currentEmail,password:currentPassword})});
const loginRes=await fetch(API+"/token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({address:currentEmail,password:currentPassword})});
const loginData=await loginRes.json();
token=loginData.token;

document.getElementById("emailDisplay").value=currentEmail;
loadInbox();
}

async function loadInbox(){
const inboxList=document.getElementById("inboxList");
inboxList.innerHTML="Loading...";
const res=await fetch(API+"/messages",{headers:{Authorization:"Bearer "+token}});
const data=await res.json();
const messages=data["hydra:member"];
inboxList.innerHTML="";
if(!messages||messages.length===0){
inboxList.innerHTML="<p>No messages yet.</p>";
return;
}
messages.forEach(msg=>{
const div=document.createElement("div");
div.className="p-3 rounded-xl bg-green-900/20 border border-green-500/30";
div.innerHTML=`<p class="font-bold">${msg.subject||"(No Subject)"}</p>
<p class="text-green-500">${msg.from.address}</p>`;
inboxList.appendChild(div);
});
}

/* COPY BUTTON */
function copyFromButton(){
navigator.clipboard.writeText(currentEmail);
const btn=document.getElementById("copyBtn");
const text=document.getElementById("copyText");
const check=document.getElementById("copyCheck");

btn.classList.add("btn-clicked");
text.classList.add("hidden");
check.classList.remove("hidden");

setTimeout(()=>{
btn.classList.remove("btn-clicked");
text.classList.remove("hidden");
check.classList.add("hidden");
},1200);
}

/* COPY ICON */
function copyFromIcon(){
navigator.clipboard.writeText(currentEmail);
const icon=document.getElementById("copyIcon");
const done=document.getElementById("doneIcon");

icon.classList.add("hidden");
done.classList.remove("hidden");

setTimeout(()=>{
icon.classList.remove("hidden");
done.classList.add("hidden");
},1200);
}

document.getElementById("copyBtn").onclick=copyFromButton;
document.getElementById("copyIconBtn").onclick=copyFromIcon;
document.getElementById("newEmailBtn").onclick=e=>{e.target.classList.add("btn-clicked");setTimeout(()=>e.target.classList.remove("btn-clicked"),400);createNewEmail();}
document.getElementById("refreshBtn").onclick=e=>{e.target.classList.add("btn-clicked");setTimeout(()=>e.target.classList.remove("btn-clicked"),400);loadInbox();}
document.getElementById("langBtn").onclick=e=>{
e.target.classList.add("btn-clicked");
setTimeout(()=>e.target.classList.remove("btn-clicked"),400);
document.getElementById("langMenu").classList.toggle("show");
};

createNewEmail();
</script>

</body>
</html>
